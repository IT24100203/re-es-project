<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    /* General Styles */
    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: white;
    }

    /* Container to hold both sections */
    .container {
      display: flex;
      width: 80%;
      max-width: 1000px;
      height: 80vh;
      box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
    }

    /* Left Section - Image */
    .image-section {
      flex: 1;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Right Section - Form */
    .form-section {
      flex: 1;
      padding: 40px;
      background: white;
      text-align: center;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    p {
      font-size: 14px;
      color: gray;
    }

    hr {
      width: 50%;
      margin: 10px auto;
      border: 0.5px solid black;
    }

    /* Form Elements */
    form {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    label {
      align-self: flex-start;
      font-size: 14px;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }

    .forgot-password {
      font-size: 12px;
      color: red;
      text-decoration: none;
      align-self: flex-start;
      margin-top: 5px;
    }

    button {
      margin-top: 20px;
      background: gray;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: black;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        height: auto;
      }

      .image-section {
        height: 300px;
      }

      .image-section img {
        height: 100%;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="image-section">
    <img src="img/drinks.jpeg" alt="Candlelit dinner">
  </div>
  <div class="form-section">
    <h2>Login</h2>
    <p>Login to continue</p>
    <hr>
    <form>
      <label for="email">Please enter Email</label>
      <input type="email" id="email" placeholder="Enter your email">

      <label for="password">Please enter password</label>
      <input type="password" id="password" placeholder="Enter your password">

      <a href="#" class="forgot-password">Forgot password?</a>

      <button type="submit">LOGIN</button>
    </form>
  </div>
</div>
</body>
</html>
