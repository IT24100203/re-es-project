<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Ceviche+One&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Ceviche+One&family=Peralta&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      height: 100vh;
      display: flex;
      background-color: white;
    }

    .left-side {
      flex: 1;
      background-color: #000;
    }

    .left-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
    }

    .right-side {
      flex: 1;
      padding: 60px 80px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo {
      position: absolute;
      top: 30px;
      left: 40px;
      font-family: 'Ceviche One', cursive;
      font-size: 28px;
      text-decoration: none;
      color: black;
    }

    h1 {
      font-size: 30px;
      text-align: center;
      margin-bottom: 20px;
    }

    hr {
      border: 1px solid #aaa;
      width: 60%;
      margin: 0 auto 40px auto;
    }

    .form-group {
      margin-bottom: 25px;
      display: flex;
      align-items: center;
    }

    .form-group label {
      width: 80px;
      font-weight: bold;
    }

    .form-group input {
      flex: 1;
      padding: 10px;
      border: none;
      background-color: #e6e6e6;
      border-radius: 8px;
      font-size: 18px;
    }

    .edit-icon {
      margin-left: 10px;
      cursor: pointer;
      font-size: 18px;
    }

    .logout-btn, .delete-btn {
      font-family: "Peralta", serif;
      margin-top: 20px;
      font-size: 18px;
      align-self: flex-end;
      padding: 10px 25px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .logout-btn {
      background: #f1ecff;
      color: #000;
    }

    .logout-btn:hover {
      background-color: black;
      color: white;
    }

    .delete-btn {
      background: #ffffff;
      color: #a83a3a;
      align-self: flex-start;
    }

    .delete-btn:hover {
      background-color: #ca3434;
      color: white;
    }

    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .left-side {
        height: 300px;
      }

      .right-side {
        padding: 40px 30px;
      }

      .form-group {
        flex-direction: column;
        align-items: flex-start;
      }

      .form-group label {
        margin-bottom: 6px;
      }
    }
  </style>
</head>
<body>

<div class="left-side">
  <img src="img/ppl.jpeg" alt="Candlelit dinner">
</div>

<div class="right-side">
  <a href="homepage.html" class="logo">RE-ES</a>
  <h1>Profile</h1>
  <hr>

  <div class="form-group">
    <label for="name">Name:</label>
    <input type="text" id="name" value="Your Name" readonly>
    <span class="edit-icon" onclick="enableEdit('name')">✏️</span>
    <span class="edit-icon" onclick="clearField('name')">🗑️</span>
  </div>

  <div class="form-group">
    <label for="email">Email:</label>
    <input type="email" id="email" value="email@example.com" readonly>
    <span class="edit-icon" onclick="enableEdit('email')">✏️</span>
    <span class="edit-icon" onclick="clearField('email')">🗑️</span>
  </div>

  <button class="logout-btn">Log-out</button>
  <button class="delete-btn" onclick="confirmDelete()">Delete Account</button>
</div>

<script>
  function enableEdit(id) {
    const input = document.getElementById(id);
    input.removeAttribute('readonly');
    input.focus();
  }

  function clearField(id) {
    const input = document.getElementById(id);
    input.value = '';
  }

  function confirmDelete() {
    const confirmDelete = confirm("Are you sure you want to delete your account? This action cannot be undone.");
    if (confirmDelete) {
      // Simulate deletion action — replace with backend call later
      alert("Your account has been deleted.");
      // Redirect to login
      window.location.href = "login.html";
    }
  }
</script>

</body>
</html>
