<!doctype html>
<html class="no-js" lang="">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RE-ES Restaurant</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+Double+Pica:ital@0;1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'IM Fell Double Pica', serif;
    }

    body {
      background-color: #ffffff;
      color: #333;
    }

    .page {
      width: 100%;
    }

    .content-wrapper {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      background-color: white;
      min-height: 80vh;
      padding: 0px;
    }

    header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 20px 50px;
      background-color: #ffffff;
    }

    .nav-links {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: #000;
      text-transform: uppercase;
      font-size: 14px;
      letter-spacing: 1px;
      font-weight: 500;
    }

    .user-logo {
      width: 24px;
      height: 24px;
      object-fit: contain;
      transition: transform 0.3s ease;
    }

    .user-logo:hover {
      transform: scale(1.1);
    }

    .logo-container {
      text-align: center;
      margin: 60px 0;
    }

    .logo {
      font-family: 'IM Fell English', serif;
      font-size: 48px;
      font-style: italic;
      text-decoration: none;
      color: #000;
    }

    .restaurant-image {
      width: calc(100% - 80px);
      height: 60vh;
      margin: 0 auto;
      display: block;
    }
  </style>
</head>
<body>

<!-- HomePage -->
<div id="homepage" class="page">
  <div class="content-wrapper">
    <header>
      <div class="nav-links">
        <a href="#reservations">Reservations</a>
        <a href="login.html">Login</a> <!-- This is the link to the login page -->
        <a href="#register">Register</a>
        <a href="#account" class="user-icon">
          <img src="img/Black_User_Member_Guest_Icon-removebg-preview.png" alt="User Account" class="user-logo">
        </a>
      </div>
    </header>

    <div class="logo-container">
      <a href="#homepage" class="logo">RE-ES</a>
    </div>

    <img src="img/Hotels Business Website in Cream Light Brown Dark Brown Modern Elegance Style.png"
         alt="RE-ES Restaurant Interior" class="restaurant-image">
  </div>
</div>

</body>
</html>
