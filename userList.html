
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User List</title>
  <link href="https://fonts.googleapis.com/css2?family=Ceviche+One&family=Peralta&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Courier New', Courier, monospace;
      background-color: white;
      padding: 40px;
    }

    .logo {
      font-family: 'Ceviche One', cursive;
      font-size: 28px;
      text-decoration: none;
      color: black;
      margin-bottom: 30px;
      display: inline-block;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #ccc;
    }

    th {
      background-color: #f1ecff;
    }

    .actions span {
      cursor: pointer;
      margin-right: 10px;
      font-size: 18px;
    }

    .actions span:hover {
      color: red;
    }
  </style>
</head>
<body>

<a href="homepage.html" class="logo">RE-ES</a>
<h1>Admin – User List</h1>

<table>
  <thead>
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Actions</th>
  </tr>
  </thead>
  <tbody id="userTable">
  <!-- Users will be populated here -->
  </tbody>
</table>

<script>
  const users = [
    { name: "Alice", email: "alice@example.com" },
    { name: "Bob", email: "bob@example.com" }
  ];

  const tableBody = document.getElementById("userTable");

  users.forEach(user => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${user.name}</td>
      <td>${user.email}</td>
      <td class="actions">
        <span title="Edit">✏️</span>
        <span title="Delete">🗑️</span>
        <span title="Reset Password">🔑</span>
      </td>
    `;
    tableBody.appendChild(row);
  });
</script>

</body>
</html>
