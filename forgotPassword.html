<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Ceviche+One&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Ceviche+One&family=Peralta&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      height: 100vh;
      display: flex;
      background-color: white;
    }

    .left-side {
      flex: 1;
      background-color: #000;
    }

    .left-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
    }

    .right-side {
      flex: 1;
      padding: 60px 80px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo {
      position: absolute;
      top: 30px;
      left: 40px;
      font-family: 'Ceviche One', cursive;
      font-size: 28px;
      text-decoration: none;
      color: black;
    }

    h1 {
      font-size: 30px;
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      margin-bottom: 10px;
      font-size: 22px;
    }

    hr {
      border: 1px solid #aaa;
      width: 60%;
      margin: 0 auto 40px auto;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 25px;
      align-items: center;
    }

    input[type="email"] {
      width: 100%;
      max-width: 400px;
      padding: 12px;
      border: none;
      background-color: #e6e6e6;
      border-radius: 8px;
      font-size: 19px;
    }

    button {
      font-family: "Peralta", serif;
      background: #f1ecff;
      color: #000;
      padding: 12px 30px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: black;
      color: white;
    }

    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .left-side {
        height: 300px;
      }

      .right-side {
        padding: 40px 30px;
      }
    }
  </style>
</head>
<body>

<div class="left-side">
  <img src="img/drinks.jpeg" alt="Forgot Password Image">
</div>

<div class="right-side">
  <a href="homepage.html" class="logo">RE-ES</a>
  <h1>Forgot password</h1>
  <p>New Password</p>
  <hr>

  <form>
    <input type="email" placeholder="Please enter Email" required>
    <button type="submit">SEND</button>
  </form>
</div>

</body>
</html>
